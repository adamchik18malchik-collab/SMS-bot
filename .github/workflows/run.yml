name: SMS Bot

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Номер телефона'
        required: true
        type: string
      time:
        description: 'Время (минуты)'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run registration
        env:
          PHONE: ${{ inputs.phone }}
          TIME: ${{ inputs.time }}
        run: python bot.py
