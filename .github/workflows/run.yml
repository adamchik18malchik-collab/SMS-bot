name: SMS Bot

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Номер телефона (только цифры)'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager
          sudo apt-get update
          sudo apt-get install -y chromium-browser
      
      - name: Run registration
        env:
          PHONE: ${{ inputs.phone }}
        run: python bot.py
