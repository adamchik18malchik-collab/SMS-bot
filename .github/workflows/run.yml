name: SMS Bot

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Номер телефона (только цифры)'
        required: true
        type: string
      chat_id:
        description: 'Твой Chat ID (узнай у @userinfobot)'
        required: true
        type: string

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Run registration
        env:
          PHONE: ${{ inputs.phone }}
          CHAT_ID: ${{ inputs.chat_id }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
